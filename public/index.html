<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task App</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="container">
    <h1>Task App</h1>

    <!-- Neuen Task erstellen -->
    <div class="form-box">
        <input
                type="text"
                id="titleInput"
                placeholder="Neuer Task..."
                aria-label="Titel des neuen Tasks"
        />
        <select id="priorityInput" aria-label="Priorität auswählen">
            <option value="low">Niedrig</option>
            <option value="medium" selected>Mittel</option>
            <option value="high">Hoch</option>
        </select>
        <button onclick="createTask()">Hinzufügen</button>
    </div>

    <!-- Filter, Suche, Sortierung -->
    <div class="filter-box">
        <input
                type="text"
                id="searchInput"
                placeholder="Suche nach Titel..."
                aria-label="Tasks durchsuchen"
                oninput="loadTasks()"
        />
        <select id="filterPriority" aria-label="Nach Priorität filtern" onchange="loadTasks()">
            <option value="">Alle Prioritäten</option>
            <option value="low">Niedrig</option>
            <option value="medium">Mittel</option>
            <option value="high">Hoch</option>
        </select>
        <select id="sortBy" aria-label="Sortierung auswählen" onchange="loadTasks()">
            <option value="">Keine Sortierung</option>
            <option value="created_at">Datum</option>
            <option value="priority">Priorität</option>
        </select>
    </div>

    <!-- Task-Liste -->
    <ul id="taskList"></ul>
</div>

<script src="app.js"></script>
</body>
</html>
